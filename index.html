<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tetris - Javascript</title>
  </head>
  <body>
    <div id="app">
      <section>Start Game</section>
      <canvas></canvas>
    </div>
    <div class="panel">
      <strong>Score: <span id="score"></span></strong>
      <strong>Level: <span id="level"></span></strong>
    </div>
    <div class="controls" aria-label="Game controls" hidden>
      <h3>Controls</h3>
      <ul>
        <li><kbd>◀</kbd> Move left</li>
        <li><kbd>▶</kbd> Move right</li>
        <li><kbd>▼</kbd> Soft drop</li>
        <li><kbd>▲</kbd> Rotate</li>
      </ul>
    </div>
    <script type="module" src="/main.js"></script>
  </body>
</html>
